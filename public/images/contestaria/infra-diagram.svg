  <text x="152" y="120" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="600">Teléfono</text>
  <text x="152" y="132" text-anchor="middle" fill="#6366f1" font-size="8">FreeSWITCH</text>

