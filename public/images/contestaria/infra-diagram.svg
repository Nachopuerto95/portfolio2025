  <rect x="700" y="140" width="168" height="160" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="784" y="160" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="0.8">INFRAESTRUCTURA</text>

  <rect x="716" y="168" width="136" height="36" rx="5" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="784" y="182" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="600">Docker</text>
  <text x="784" y="196" text-anchor="middle" fill="#6366f1" font-size="8">Multi-servidor · containers</text>

  <rect x="716" y="216" width="136" height="36" rx="5" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="784" y="230" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="600">WireGuard VPN</text>
  <text x="784" y="244" text-anchor="middle" fill="#6366f1" font-size="8">Red privada entre servidores</text>

  <rect x="716" y="264" width="136" height="36" rx="5" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="784" y="278" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="600">n8n · Claude · OpenAI</text>
  <text x="784" y="292" text-anchor="middle" fill="#6366f1" font-size="8">Automatización interna con IA</text>

  <!-- ─── FLECHAS ─── -->
  <!-- Clients → Backend -->
  <line x1="200" y1="124" x2="240" y2="188" stroke="#475569" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <!-- Frontend → Backend -->
  <line x1="200" y1="240" x2="240" y2="240" stroke="#475569" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <!-- Backend → Voice -->
  <line x1="440" y1="210" x2="480" y2="210" stroke="#3b4f6e" stroke-width="1.5" marker-end="url(#arrow-accent)"/>
  <!-- Backend → Observability -->
  <line x1="340" y1="400" x2="480" y2="400" stroke="#475569" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <!-- Voice → Infra -->
  <line x1="680" y1="210" x2="700" y2="210" stroke="#475569" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <!-- Clients Phone → Voice -->
  <line x1="184" y1="124" x2="496" y2="190" stroke="#3b4f6e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-accent)"/>

  <!-- ─── LEYENDA ─── -->
  <rect x="30" y="490" width="840" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="55" y="512" fill="#94a3b8" font-size="10" font-weight="600">Stack completo:</text>
  <text x="55" y="530" fill="#64748b" font-size="10">Frontend: React, TypeScript, Vite</text>
  <text x="55" y="548" fill="#64748b" font-size="10">Backend: FastAPI, Python, PostgreSQL, Redis, Celery</text>
  <text x="340" y="530" fill="#64748b" font-size="10">Voz: FreeSWITCH (SIP/PSTN), LiveKit (WebRTC), STT → LLM → TTS</text>
  <text x="340" y="548" fill="#64748b" font-size="10">Infra: Docker, WireGuard VPN, Prometheus, Grafana, Loki, Alertmanager</text>
  <text x="700" y="530" fill="#64748b" font-size="10">Automatización: n8n, Claude API, OpenAI</text>
  <text x="700" y="548" fill="#64748b" font-size="10">Auth: JWT, multi-tenant (workspaces)</text>
</svg>
