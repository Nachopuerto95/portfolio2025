backend:
  name: github
  repo: Nachopuerto95/portfolio2025
  branch: main

media_folder: "public/images"
public_folder: "/images"

publish_mode: simple

# Reusable fragment for bilingual strings
# (Decap no soporta YAML anchors reales, dejamos los campos inline.)

collections:
  - name: site
    label: "Contenido del sitio"
    files:
      - name: site
        label: "General"
        file: "src/data/site.json"
        format: json
        fields:
          - { label: "Nombre", name: name, widget: string }

          - label: "Estado (status pill)"
            name: status
            widget: object
            fields:
              - label: "Etiqueta"
                name: label
                widget: object
                fields:
                  - { label: "Español", name: es, widget: string }
                  - { label: "English", name: en, widget: string }

          - label: "Rol (subtítulo)"
            name: role
            widget: object
            fields:
              - { label: "Español", name: es, widget: string }
              - { label: "English", name: en, widget: string }

          - label: "Tagline"
            name: tagline
            widget: object
            fields:
              - { label: "Español", name: es, widget: text }
              - { label: "English", name: en, widget: text }

          - label: "Navegación (etiquetas del menú)"
            name: nav
            widget: object
            fields:
              - label: "About"
                name: about
                widget: object
                fields:
                  - { label: "ES", name: es, widget: string }
                  - { label: "EN", name: en, widget: string }
              - label: "Experience"
                name: experience
                widget: object
                fields:
                  - { label: "ES", name: es, widget: string }
                  - { label: "EN", name: en, widget: string }
              - label: "Web"
                name: web
                widget: object
                fields:
                  - { label: "ES", name: es, widget: string }
                  - { label: "EN", name: en, widget: string }
              - label: "Low-level"
                name: low
                widget: object
                fields:
                  - { label: "ES", name: es, widget: string }
                  - { label: "EN", name: en, widget: string }
              - label: "Highlights"
                name: highlights
                widget: object
                fields:
                  - { label: "ES", name: es, widget: string }
                  - { label: "EN", name: en, widget: string }

          - label: "Redes sociales"
            name: social
            widget: object
            fields:
              - { label: "GitHub URL", name: github, widget: string }
              - { label: "LinkedIn URL", name: linkedin, widget: string }

          - label: "Sobre mí"
            name: about
            widget: object
            fields:
              - { label: "Español", name: es, widget: markdown }
              - { label: "English", name: en, widget: markdown }
            hint: "Usa **texto** para negrita y deja una línea en blanco entre párrafos."

          - label: "Experiencia profesional"
            name: experience
            widget: list
            summary: "{{fields.company}}"
            fields:
              - { label: "Empresa", name: company, widget: string }
              - { label: "Logo de la empresa", name: logo, widget: image, required: false }
              - label: "Imágenes / GIFs del trabajo"
                name: media
                widget: list
                required: false
                field: { label: "Imagen o GIF", name: item, widget: image }
                hint: "Capturas, diagramas o GIFs. Asegúrate de tener permiso antes de publicar contenido de la empresa."
              - label: "Puesto"
                name: role
                widget: object
                fields:
                  - { label: "ES", name: es, widget: string }
                  - { label: "EN", name: en, widget: string }
              - label: "Periodo"
                name: period
                widget: object
                fields:
                  - { label: "ES", name: es, widget: string }
                  - { label: "EN", name: en, widget: string }
              - label: "Descripción"
                name: description
                widget: object
                fields:
                  - { label: "ES", name: es, widget: text }
                  - { label: "EN", name: en, widget: text }
              - label: "Logros / Responsabilidades"
                name: highlights
                widget: object
                required: false
                fields:
                  - label: "ES"
                    name: es
                    widget: list
                    field: { label: "Línea", name: line, widget: string }
                  - label: "EN"
                    name: en
                    widget: list
                    field: { label: "Line", name: line, widget: string }
              - label: "Stack tecnológico"
                name: stack
                widget: list
                field: { label: "Tecnología", name: tech, widget: string }

          - label: "Highlights / Reconocimientos"
            name: highlights
            widget: list
            summary: "{{fields.title.es}}"
            fields:
              - label: "Icono (Font Awesome)"
                name: icon
                widget: string
                hint: "Ej: fa-solid fa-trophy, fa-solid fa-star, fa-solid fa-medal"
              - label: "Título"
                name: title
                widget: object
                fields:
                  - { label: "ES", name: es, widget: string }
                  - { label: "EN", name: en, widget: string }
              - label: "Dónde / Contexto"
                name: where
                widget: object
                required: false
                fields:
                  - { label: "ES", name: es, widget: string }
                  - { label: "EN", name: en, widget: string }

          - label: "Títulos de sección"
            name: sections
            widget: object
            fields:
              - label: "Experiencia"
                name: experience
                widget: object
                fields:
                  - { label: "ES", name: es, widget: string }
                  - { label: "EN", name: en, widget: string }
              - label: "Web"
                name: web
                widget: object
                fields:
                  - { label: "ES", name: es, widget: string }
                  - { label: "EN", name: en, widget: string }
              - label: "Low-level"
                name: low
                widget: object
                fields:
                  - { label: "ES", name: es, widget: string }
                  - { label: "EN", name: en, widget: string }
              - label: "Highlights"
                name: highlights
                widget: object
                fields:
                  - { label: "ES", name: es, widget: string }
                  - { label: "EN", name: en, widget: string }

  - name: projects
    label: "Proyectos"
    files:
      - name: projects
        label: "Lista de proyectos"
        file: "src/data/projects.json"
        format: json
        fields:
          - label: "Proyectos"
            name: projects
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: "Título", name: title, widget: string }
              - label: "¿Es proyecto Web full-stack?"
                name: web
                widget: boolean
                default: true
                hint: "Activado = sección Web. Desactivado = sección Low-level."
              - { label: "Descripción", name: description, widget: text }
              - { label: "Enlace al sitio", name: link, widget: string, required: false }
              - { label: "Repositorio GitHub", name: git, widget: string, required: false }
              - label: "Imágenes"
                name: images
                widget: list
                field: { label: "Imagen", name: image, widget: image }
              - label: "Tags"
                name: tags
                widget: list
                field: { label: "Tag", name: tag, widget: string }
              - label: "Características"
                name: caracteristicas
                widget: list
                required: false
                summary: "{{fields.name}}"
                fields:
                  - { label: "Nombre", name: name, widget: string }
                  - label: "Líneas"
                    name: lines
                    widget: list
                    field: { label: "Línea", name: line, widget: string }
