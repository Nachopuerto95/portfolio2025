  <text x="450" y="54" text-anchor="middle" fill="#64748b" font-size="11">Datista Tech · Founding Engineer</text>

  <!-- ─── ZONA: CLIENTS ─── -->
  <rect x="30" y="76" width="170" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="115" y="96" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="0.8">CLIENTES</text>
