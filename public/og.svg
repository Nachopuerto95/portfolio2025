<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#141a2d"/>
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Status pill -->
  <g transform="translate(80, 90)">
    <rect x="0" y="0" rx="20" ry="20" width="260" height="36" fill="rgba(74,222,128,0.1)" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
    <circle cx="22" cy="18" r="4.5" fill="#4ade80"/>
    <text x="40" y="24" font-family="Space Grotesk, Inter, sans-serif" font-size="14" font-weight="500" fill="#86efac">Building @ Datista</text>
  </g>

  <!-- Name -->
  <text x="80" y="260" font-family="Space Grotesk, Inter, sans-serif" font-size="120" font-weight="700" fill="#e2e8f0" letter-spacing="-3">Nacho Puerto</text>

  <!-- Role -->
  <text x="80" y="330" font-family="Space Grotesk, Inter, sans-serif" font-size="44" font-weight="600" fill="#a5b4fc">Full-stack &amp; AI engineer</text>

  <!-- Tagline -->
  <text x="80" y="400" font-family="Inter, sans-serif" font-size="26" font-weight="400" fill="#94a3b8">Producto entero, del navegador al servidor.</text>

  <!-- Bottom row: social -->
  <g transform="translate(80, 520)" font-family="Inter, sans-serif" font-size="20" font-weight="500" fill="#94a3b8">
    <text x="0" y="0">nachopuerto.com</text>
    <text x="260" y="0">·</text>
    <text x="290" y="0">Founding Engineer @ Datista</text>
  </g>

  <!-- Accent line -->
  <rect x="80" y="445" width="120" height="3" fill="#818cf8" rx="1.5"/>
</svg>
