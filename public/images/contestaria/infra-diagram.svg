<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#475569"/>
    </marker>
    <marker id="av" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#38bdf8"/>
    </marker>
    <marker id="aw" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#818cf8"/>
    </marker>
    <marker id="am" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#4ade80"/>
    </marker>
  </defs>

  <rect width="960" height="620" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="480" y="26" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">ContestarIA — System Architecture</text>
  <text x="480" y="42" text-anchor="middle" fill="#334155" font-size="10">2 independent blocks · 7 VPS · real-time voice AI · production</text>

  <!-- ── BLOCK 1: datista_api ─────────────────────────────── -->
  <rect x="12" y="54" width="210" height="390" rx="8" fill="#1a2035" stroke="#3b4f6e" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="117" y="72" text-anchor="middle" fill="#818cf8" font-size="10" font-weight="700" letter-spacing="0.5">SaaS PLATFORM</text>
  <text x="117" y="85" text-anchor="middle" fill="#334155" font-size="9">datista_api · Azure SQL</text>

  <rect x="22" y="94" width="190" height="44" rx="6" fill="#0f172a" stroke="#3b4f6e" stroke-width="1"/>
  <text x="117" y="111" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">Clients</text>
  <text x="117" y="125" text-anchor="middle" fill="#475569" font-size="8.5">Widget embed · contestaria.cloud</text>

  <rect x="22" y="148" width="190" height="100" rx="6" fill="#0f172a" stroke="#4f46e5" stroke-width="1"/>
  <text x="117" y="165" text-anchor="middle" fill="#818cf8" font-size="9" font-weight="700">datista_api</text>
  <text x="117" y="180" text-anchor="middle" fill="#475569" font-size="8.5">Users · Workspaces · Agents</text>
  <text x="117" y="194" text-anchor="middle" fill="#475569" font-size="8.5">Subscriptions · Billing</text>
  <text x="117" y="208" text-anchor="middle" fill="#475569" font-size="8.5">Widget API keys</text>
  <text x="117" y="222" text-anchor="middle" fill="#334155" font-size="8">FastAPI · Azure SQL</text>

  <text x="117" y="268" text-anchor="middle" fill="#334155" font-size="8.5" font-weight="600">3 convergence points:</text>
  <text x="117" y="283" text-anchor="middle" fill="#334155" font-size="8">① creates LiveKit room via voicehub</text>
  <text x="117" y="297" text-anchor="middle" fill="#334155" font-size="8">② verifies subscription pre-call</text>
  <text x="117" y="311" text-anchor="middle" fill="#334155" font-size="8">③ ingests transcript post-call</text>

  <rect x="22" y="328" width="190" height="104" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="117" y="345" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">Admin panel</text>
  <text x="117" y="359" text-anchor="middle" fill="#475569" font-size="8.5">Workspace management</text>
  <text x="117" y="373" text-anchor="middle" fill="#475569" font-size="8.5">Conversation history</text>
  <text x="117" y="387" text-anchor="middle" fill="#475569" font-size="8.5">Agent configuration</text>
  <text x="117" y="401" text-anchor="middle" fill="#334155" font-size="8">React · TypeScript</text>
  <text x="117" y="415" text-anchor="middle" fill="#334155" font-size="8">multi-tenant workspaces</text>

  <!-- ── BLOCK 2: VPS Infra ──────────────────────────────── -->
  <rect x="238" y="54" width="596" height="540" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="536" y="72" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="700" letter-spacing="0.5">VPS INFRA · Private network · WireGuard</text>
  <text x="536" y="85" text-anchor="middle" fill="#1e3a4a" font-size="9">7 servers · container-per-agent · full observability</text>

  <!-- INFRA node -->
  <rect x="252" y="94" width="200" height="230" rx="7" fill="#1e293b" stroke="#4f6080" stroke-width="1.2"/>
  <text x="352" y="112" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="700">INFRA</text>
  <text x="352" y="125" text-anchor="middle" fill="#334155" font-size="8.5">API gateway · voicehub.contestaria.com</text>

  <rect x="262" y="132" width="180" height="30" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="352" y="149" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="600">Caddy reverse proxy</text>
  <text x="352" y="160" text-anchor="middle" fill="#475569" font-size="8">HTTPS · auto TLS</text>

  <rect x="262" y="170" width="180" height="30" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="352" y="187" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="600">FastAPI · Python</text>
  <text x="352" y="198" text-anchor="middle" fill="#475569" font-size="8">agents API · dispatch rules</text>

  <rect x="262" y="208" width="86" height="30" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="305" y="225" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="600">PostgreSQL</text>
  <text x="305" y="236" text-anchor="middle" fill="#475569" font-size="8">conversations</text>

  <rect x="356" y="208" width="86" height="30" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="399" y="225" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="600">Redis</text>
  <text x="399" y="236" text-anchor="middle" fill="#475569" font-size="8">shared w/ LiveKit</text>

  <rect x="262" y="246" width="180" height="30" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="352" y="263" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="600">Celery workers</text>
  <text x="352" y="274" text-anchor="middle" fill="#475569" font-size="8">async tasks · WireGuard hub</text>

  <rect x="262" y="284" width="180" height="28" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="352" y="302" text-anchor="middle" fill="#475569" font-size="8">React frontend · Node/Redis/PG exporters</text>

  <!-- LIVEKIT node -->
  <rect x="470" y="94" width="196" height="180" rx="7" fill="#1e2a3a" stroke="#0284c7" stroke-width="1.2"/>
  <text x="568" y="112" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="700">LIVEKIT</text>
  <text x="568" y="125" text-anchor="middle" fill="#1e3a4a" font-size="8.5">WebRTC media server · SIP gateway</text>

  <rect x="480" y="132" width="176" height="36" rx="5" fill="#0f172a" stroke="#0284c7" stroke-width="1"/>
  <text x="568" y="148" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="600">LiveKit Server</text>
  <text x="568" y="160" text-anchor="middle" fill="#38bdf8" font-size="8">WebRTC · RTP media streams</text>
  <text x="568" y="171" text-anchor="middle" fill="#1e3a4a" font-size="7.5">wss://livekit.contestaria.com</text>

  <rect x="480" y="176" width="176" height="36" rx="5" fill="#0f172a" stroke="#0284c7" stroke-width="1"/>
  <text x="568" y="192" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="600">LiveKit SIP gateway</text>
  <text x="568" y="204" text-anchor="middle" fill="#38bdf8" font-size="8">receives SIP from FreeSWITCH</text>
  <text x="568" y="215" text-anchor="middle" fill="#1e3a4a" font-size="7.5">network: host · shared Redis w/ INFRA</text>

  <text x="568" y="250" text-anchor="middle" fill="#1e3a4a" font-size="8">Node Exporter · LK metrics → CENTRAL</text>

  <!-- AGENTS node -->
  <rect x="252" y="342" width="414" height="236" rx="7" fill="#1d1a35" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="459" y="360" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="700">AGENTS-01</text>
  <text x="459" y="374" text-anchor="middle" fill="#4c1d95" font-size="8.5">Dedicated server · high CPU/RAM · no public IP</text>
  <text x="459" y="387" text-anchor="middle" fill="#4c1d95" font-size="8">SSH access only via INFRA ProxyJump · GitHub Actions deploy ~30s</text>

  <!-- Container labels -->
  <text x="270" y="406" fill="#7c3aed" font-size="8" font-weight="600">container per agent — agents-core base image (Python · LiveKit Agents · STT/LLM/TTS plugins)</text>

  <rect x="262" y="412" width="124" height="52" rx="5" fill="#0f172a" stroke="#7c3aed" stroke-width="1"/>
  <text x="324" y="428" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">Voice Agent A</text>
  <text x="324" y="441" text-anchor="middle" fill="#6d28d9" font-size="8">PRODUCTION</text>
  <text x="324" y="455" text-anchor="middle" fill="#334155" font-size="7.5">health · LK metrics · custom metrics</text>

  <rect x="394" y="412" width="124" height="52" rx="5" fill="#0f172a" stroke="#7c3aed" stroke-width="1"/>
  <text x="456" y="428" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">Voice Agent B</text>
  <text x="456" y="441" text-anchor="middle" fill="#6d28d9" font-size="8">PRODUCTION</text>
  <text x="456" y="455" text-anchor="middle" fill="#334155" font-size="7.5">health · LK metrics · custom metrics</text>

  <rect x="524" y="412" width="124" height="52" rx="5" fill="#0f172a" stroke="#7c3aed" stroke-width="1"/>
  <text x="586" y="428" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">Voice Agent C</text>
  <text x="586" y="441" text-anchor="middle" fill="#6d28d9" font-size="8">PRODUCTION</text>
  <text x="586" y="455" text-anchor="middle" fill="#334155" font-size="7.5">self-contained · no shared base</text>

  <rect x="262" y="472" width="386" height="40" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="455" y="488" text-anchor="middle" fill="#64748b" font-size="8.5">autoheal · promtail (logs → Loki) · Node Exporter · Prometheus file_sd auto-discovery</text>
  <text x="455" y="502" text-anchor="middle" fill="#334155" font-size="8">STT latency · LLM latency · TTS latency · calls total · workers active — per agent metrics</text>

  <!-- CENTRAL node -->
  <rect x="682" y="342" width="140" height="236" rx="7" fill="#0f2818" stroke="#16a34a" stroke-width="1.2"/>
  <text x="752" y="360" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="700">CENTRAL</text>
  <text x="752" y="374" text-anchor="middle" fill="#14532d" font-size="8.5">bastion · monitoring hub</text>

  <rect x="692" y="382" width="120" height="26" rx="4" fill="#0f172a" stroke="#16a34a" stroke-width="1"/>
  <text x="752" y="399" text-anchor="middle" fill="#86efac" font-size="8.5" font-weight="600">Prometheus</text>

  <rect x="692" y="414" width="120" height="26" rx="4" fill="#0f172a" stroke="#16a34a" stroke-width="1"/>
  <text x="752" y="431" text-anchor="middle" fill="#86efac" font-size="8.5" font-weight="600">Grafana</text>

  <rect x="692" y="446" width="120" height="26" rx="4" fill="#0f172a" stroke="#16a34a" stroke-width="1"/>
  <text x="752" y="463" text-anchor="middle" fill="#86efac" font-size="8.5" font-weight="600">Loki</text>

  <rect x="692" y="478" width="120" height="26" rx="4" fill="#0f172a" stroke="#16a34a" stroke-width="1"/>
  <text x="752" y="495" text-anchor="middle" fill="#86efac" font-size="8.5" font-weight="600">Alertmanager</text>

  <text x="752" y="526" text-anchor="middle" fill="#14532d" font-size="8">scrapes all VPS via</text>
  <text x="752" y="538" text-anchor="middle" fill="#14532d" font-size="8">private network</text>
  <text x="752" y="552" text-anchor="middle" fill="#14532d" font-size="8">+ WireGuard fwd</text>
  <text x="752" y="566" text-anchor="middle" fill="#14532d" font-size="8">SSH ProxyJump hub</text>

  <!-- ── EXTERNAL ───────────────────────────────────────── -->
  <rect x="850" y="54" width="100" height="62" rx="7" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="900" y="73" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="700">PSTN</text>
  <text x="900" y="87" text-anchor="middle" fill="#475569" font-size="8">carrier / Sewan</text>
  <text x="900" y="100" text-anchor="middle" fill="#475569" font-size="8">SIP trunk</text>

  <rect x="850" y="130" width="100" height="62" rx="7" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="900" y="149" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="700">FreeSWITCH</text>
  <text x="900" y="163" text-anchor="middle" fill="#38bdf8" font-size="8">SIP / PSTN</text>
  <text x="900" y="177" text-anchor="middle" fill="#475569" font-size="8">telephony gateway</text>

  <rect x="850" y="210" width="100" height="70" rx="7" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="900" y="229" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="700">AI Providers</text>
  <text x="900" y="243" text-anchor="middle" fill="#c4b5fd" font-size="8">STT: Deepgram</text>
  <text x="900" y="257" text-anchor="middle" fill="#c4b5fd" font-size="8">LLM: OpenAI/Claude</text>
  <text x="900" y="270" text-anchor="middle" fill="#c4b5fd" font-size="8">TTS: Azure/OpenAI</text>

  <rect x="850" y="298" width="100" height="60" rx="7" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="900" y="317" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="700">N8N</text>
  <text x="900" y="331" text-anchor="middle" fill="#475569" font-size="8">automation</text>
  <text x="900" y="345" text-anchor="middle" fill="#475569" font-size="8">post-call ingest</text>

  <!-- ── ARROWS ──────────────────────────────────────────── -->
  <!-- datista_api → INFRA (create room) -->
  <line x1="222" y1="200" x2="252" y2="200" stroke="#818cf8" stroke-width="1.5" marker-end="url(#aw)"/>
  <text x="237" y="194" text-anchor="middle" fill="#818cf8" font-size="7.5">① room</text>

  <!-- INFRA → LIVEKIT (room+token) -->
  <line x1="452" y1="170" x2="470" y2="170" stroke="#818cf8" stroke-width="1.5" marker-end="url(#aw)"/>
  <text x="461" y="163" text-anchor="middle" fill="#818cf8" font-size="7.5">token</text>

  <!-- INFRA → AGENTS-01 (dispatch via Redis/WireGuard) -->
  <line x1="352" y1="324" x2="352" y2="342" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- LIVEKIT → AGENTS-01 (assigns room to worker) -->
  <line x1="530" y1="274" x2="490" y2="342" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#av)"/>
  <text x="540" y="315" fill="#38bdf8" font-size="8">room → worker</text>

  <!-- PSTN → FreeSWITCH -->
  <line x1="900" y1="116" x2="900" y2="130" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#av)"/>

  <!-- FreeSWITCH → LIVEKIT SIP -->
  <line x1="850" y1="161" x2="666" y2="180" stroke="#38bdf8" stroke-width="2" marker-end="url(#av)"/>
  <text x="780" y="156" text-anchor="middle" fill="#38bdf8" font-size="8.5" font-weight="600">SIP</text>

  <!-- AGENTS-01 → AI Providers -->
  <line x1="666" y1="460" x2="850" y2="260" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>
  <text x="790" y="380" text-anchor="middle" fill="#c4b5fd" font-size="8">STT→LLM→TTS</text>

  <!-- INFRA → N8N (webhook) -->
  <line x1="666" y1="280" x2="850" y2="325" stroke="#475569" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#a)"/>
  <text x="790" y="295" text-anchor="middle" fill="#334155" font-size="7.5">webhook</text>

  <!-- N8N → datista_api -->
  <line x1="850" y1="335" x2="222" y2="260" stroke="#334155" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#a)"/>
  <text x="540" y="360" text-anchor="middle" fill="#334155" font-size="7.5">③ POST ingest</text>

  <!-- CENTRAL monitoring arrows -->
  <line x1="682" y1="430" x2="666" y2="260" stroke="#4ade80" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#am)"/>
  <line x1="695" y1="390" x2="452" y2="220" stroke="#4ade80" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#am)"/>
  <line x1="682" y1="460" x2="666" y2="460" stroke="#4ade80" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#am)"/>
  <text x="694" y="408" fill="#166534" font-size="7.5">metrics</text>
  <text x="694" y="419" fill="#166534" font-size="7.5">+ logs</text>

  <!-- datista_api verify -->
  <path d="M222,240 C237,240 237,248 252,248" stroke="#334155" stroke-width="1" stroke-dasharray="3,2" fill="none" marker-end="url(#a)"/>
  <text x="214" y="235" fill="#334155" font-size="7.5">② verify</text>

  <!-- ── LEGEND ──────────────────────────────────────────── -->
  <rect x="12" y="560" width="936" height="50" rx="7" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <line x1="28" y1="579" x2="58" y2="579" stroke="#38bdf8" stroke-width="2" marker-end="url(#av)"/>
  <text x="68" y="583" fill="#94a3b8" font-size="8.5">Voice: PSTN → FreeSWITCH → LiveKit SIP → Voice Worker → STT→LLM→TTS</text>

  <line x1="28" y1="599" x2="58" y2="599" stroke="#818cf8" stroke-width="2" marker-end="url(#aw)"/>
  <text x="68" y="603" fill="#94a3b8" font-size="8.5">Web: Widget → datista_api → voicehub (creates room + token) → Widget connects directly to LiveKit WSS</text>

  <line x1="520" y1="579" x2="550" y2="579" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#am)"/>
  <text x="560" y="583" fill="#94a3b8" font-size="8.5">Observability: Prometheus · Grafana · Loki · Alertmanager (all from CENTRAL)</text>
</svg>
