  <text x="580" y="402" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="600">Prometheus · Grafana · Loki</text>
  <text x="580" y="416" text-anchor="middle" fill="#6366f1" font-size="8">Alertmanager · métricas · logs</text>

