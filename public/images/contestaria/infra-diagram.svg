  <text x="340" y="287" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="600">Base de datos</text>
  <text x="340" y="301" text-anchor="middle" fill="#6366f1" font-size="8">PostgreSQL</text>

  <rect x="256" y="324" width="168" height="40" rx="5" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="340" y="339" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="600">Autenticación</text>
