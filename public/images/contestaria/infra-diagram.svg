  <text x="580" y="182" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="600">FreeSWITCH</text>
  <text x="580" y="196" text-anchor="middle" fill="#7dd3fc" font-size="8">Telefonía SIP · PSTN</text>

  <rect x="496" y="216" width="78" height="36" rx="5" fill="#0f172a" stroke="#3b4f6e" stroke-width="1"/>
  <text x="535" y="230" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="600">LiveKit</text>
  <text x="535" y="244" text-anchor="middle" fill="#7dd3fc" font-size="8">WebRTC</text>

