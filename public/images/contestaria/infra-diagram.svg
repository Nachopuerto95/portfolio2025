  <text x="625" y="230" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="600">STT → LLM</text>
  <text x="625" y="244" text-anchor="middle" fill="#7dd3fc" font-size="8">→ TTS</text>

  <rect x="496" y="264" width="168" height="36" rx="5" fill="#0f172a" stroke="#3b4f6e" stroke-width="1"/>
  <text x="580" y="278" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="600">Agente Conversacional</text>
