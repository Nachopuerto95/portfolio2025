<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </linearGradient>
    <radialGradient id="glow-tl" cx="20%" cy="15%" r="55%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-br" cx="90%" cy="85%" r="60%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148,163,184,0.05)" stroke-width="1"/>
    </pattern>
    <linearGradient id="accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow-tl)"/>
  <rect width="1200" height="630" fill="url(#glow-br)"/>

  <!-- Status pill -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" rx="22" ry="22" width="290" height="44" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.3)" stroke-width="1.5"/>
    <circle cx="26" cy="22" r="6" fill="#4ade80"/>
    <circle cx="26" cy="22" r="11" fill="none" stroke="#4ade80" stroke-opacity="0.3" stroke-width="1"/>
    <text x="48" y="29" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="16" font-weight="600" fill="#86efac" letter-spacing="0.01em">Building ContestarIA</text>
  </g>

  <!-- Name -->
  <text x="80" y="290" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="148" font-weight="700" fill="#e2e8f0" letter-spacing="-5">Nacho Puerto</text>

  <!-- Accent line -->
  <rect x="80" y="315" width="120" height="4" fill="url(#accent-line)" rx="2"/>

  <!-- Role -->
  <text x="80" y="390" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="52" font-weight="600" fill="#a5b4fc" letter-spacing="-1">Full-stack &amp; AI engineer</text>

  <!-- Tagline -->
  <text x="80" y="450" font-family="'Inter', sans-serif" font-size="28" font-weight="400" fill="#94a3b8" letter-spacing="0">Producto entero, del navegador al servidor.</text>

  <!-- Tech pills row -->
  <g transform="translate(80, 510)" font-family="'Inter', sans-serif" font-size="16" font-weight="600">
    <g transform="translate(0, 0)">
      <rect rx="14" ry="14" width="92" height="32" fill="rgba(129,140,248,0.14)" stroke="rgba(129,140,248,0.25)" stroke-width="1"/>
      <text x="46" y="21" text-anchor="middle" fill="#a5b4fc">FastAPI</text>
    </g>
    <g transform="translate(104, 0)">
      <rect rx="14" ry="14" width="74" height="32" fill="rgba(129,140,248,0.14)" stroke="rgba(129,140,248,0.25)" stroke-width="1"/>
      <text x="37" y="21" text-anchor="middle" fill="#a5b4fc">React</text>
    </g>
    <g transform="translate(190, 0)">
      <rect rx="14" ry="14" width="108" height="32" fill="rgba(129,140,248,0.14)" stroke="rgba(129,140,248,0.25)" stroke-width="1"/>
      <text x="54" y="21" text-anchor="middle" fill="#a5b4fc">TypeScript</text>
    </g>
    <g transform="translate(310, 0)">
      <rect rx="14" ry="14" width="112" height="32" fill="rgba(129,140,248,0.14)" stroke="rgba(129,140,248,0.25)" stroke-width="1"/>
      <text x="56" y="21" text-anchor="middle" fill="#a5b4fc">PostgreSQL</text>
    </g>
    <g transform="translate(434, 0)">
      <rect rx="14" ry="14" width="88" height="32" fill="rgba(129,140,248,0.14)" stroke="rgba(129,140,248,0.25)" stroke-width="1"/>
      <text x="44" y="21" text-anchor="middle" fill="#a5b4fc">LiveKit</text>
    </g>
    <g transform="translate(534, 0)">
      <rect rx="14" ry="14" width="128" height="32" fill="rgba(129,140,248,0.14)" stroke="rgba(129,140,248,0.25)" stroke-width="1"/>
      <text x="64" y="21" text-anchor="middle" fill="#a5b4fc">Voice AI · LLM</text>
    </g>
  </g>

  <!-- Right side: large circle with monogram -->
  <g transform="translate(1000, 180)">
    <circle cx="0" cy="0" r="185" fill="none" stroke="rgba(129,140,248,0.15)" stroke-width="2" stroke-dasharray="4 8"/>
    <circle cx="0" cy="0" r="150" fill="rgba(129,140,248,0.08)" stroke="rgba(129,140,248,0.35)" stroke-width="2"/>
    <text y="50" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="160" font-weight="700" fill="#818cf8" letter-spacing="-6">NP</text>
  </g>
</svg>
